quarkus.application.name=notificationservice

quarkus.hibernate-orm.database.generation=create-drop

quarkus.datasource.devservices.enabled=false

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/notificationdb
quarkus.datasource.username=user
quarkus.datasource.password=password


# ActiveMQ Broker Einstellungen
camel.component.activemq.brokerURL=tcp://localhost:61616
camel.component.activemq.username=artemis
camel.component.activemq.password=artemis
